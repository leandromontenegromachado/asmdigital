services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asmdigital}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-asmdigital}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/asmdigital}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@company.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      REDMINE_DEFAULT_TIMEOUT: ${REDMINE_DEFAULT_TIMEOUT:-20}
      REDMINE_RETRY_ATTEMPTS: ${REDMINE_RETRY_ATTEMPTS:-3}
      REDMINE_RETRY_WAIT_SECONDS: ${REDMINE_RETRY_WAIT_SECONDS:-2}
      FALA_AI_TEAMS_WEBHOOK_SECRET: ${FALA_AI_TEAMS_WEBHOOK_SECRET:-}
      FALA_AI_TEAMS_OUTGOING_WEBHOOK: ${FALA_AI_TEAMS_OUTGOING_WEBHOOK:-}
      FALA_AI_TEAMS_BOT_APP_ID: ${FALA_AI_TEAMS_BOT_APP_ID:-}
      FALA_AI_TEAMS_BOT_APP_SECRET: ${FALA_AI_TEAMS_BOT_APP_SECRET:-}
      FALA_AI_TEAMS_BOT_TENANT_ID: ${FALA_AI_TEAMS_BOT_TENANT_ID:-botframework.com}
      FALA_AI_TEAMS_DEFAULT_SERVICE_URL: ${FALA_AI_TEAMS_DEFAULT_SERVICE_URL:-}
      FALA_AI_TEAMS_DEFAULT_CONVERSATION_ID: ${FALA_AI_TEAMS_DEFAULT_CONVERSATION_ID:-}
      FALA_AI_TEAMS_DEFAULT_BOT_ID: ${FALA_AI_TEAMS_DEFAULT_BOT_ID:-}
      FALA_AI_TEAMS_FALLBACK_USER_EMAIL: ${FALA_AI_TEAMS_FALLBACK_USER_EMAIL:-}
      FALA_AI_TEAMS_FALLBACK_USER_ID: ${FALA_AI_TEAMS_FALLBACK_USER_ID:-}
      FALA_AI_MISSING_CHECKIN_CRON: ${FALA_AI_MISSING_CHECKIN_CRON:-0 16 * * 1-5}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  redmine-mcp:
    build: ./mcp/redmine
    restart: unless-stopped
    environment:
      REDMINE_URL: ${REDMINE_URL}
      REDMINE_API_KEY: ${REDMINE_API_KEY}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 9000
    ports:
      - "${REDMINE_MCP_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 9000), 3); s.close()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  azure-devops-mcp:
    image: guang1/azure-devops-mcp:latest
    profiles: ["mcp"]
    restart: unless-stopped
    environment:
      org.name: ${AZURE_DEVOPS_ORG}
      project.name: ${AZURE_DEVOPS_PROJECT}
      pat: ${AZURE_DEVOPS_PAT}
    ports:
      - "${AZURE_MCP_PORT:-9010}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/mcp >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  db_data:
